<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WorkInProgress HQ</title>
<style>
:root{
  --bg:#0B1626; --surface:#12233B; --surface2:#182E4C; --line:#22395A;
  --ink:#EAF2FA; --ink2:#9FB4CC; --ink3:#6C82A0;
  --teal:#35E0CD; --teal-dim:rgba(53,224,205,.13);
  --lime:#CDF556; --lime-dim:rgba(205,245,86,.12);
  --warn:#F2B84B; --danger:#F0705F; --ok:#4ADE94;
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);
  font-family:"Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
  font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
button:disabled{opacity:.5;cursor:default}
input,select,textarea{font:inherit;color:var(--ink);background:var(--bg);
  border:1px solid var(--line);border-radius:8px;padding:8px 10px;width:100%}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--teal);outline-offset:1px}
::placeholder{color:var(--ink3)}
h1,h2,h3{text-wrap:balance;line-height:1.25}

.app{display:flex;min-height:100vh}
.side{width:224px;flex:none;border-right:1px solid var(--line);padding:22px 14px;
  display:flex;flex-direction:column;gap:6px;position:sticky;top:0;height:100vh}
.logo{display:flex;align-items:center;gap:10px;padding:0 8px 18px}
.logo svg{flex:none}
.logo b{font-size:16px;letter-spacing:-.01em}
.logo b i{font-style:normal;color:var(--teal)}
.logo small{display:block;font-size:10.5px;color:var(--ink3);letter-spacing:.12em;text-transform:uppercase}
.nav-btn{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:9px;
  color:var(--ink2);font-size:14.5px;text-align:left;width:100%}
.nav-btn svg{flex:none;opacity:.75}
.nav-btn:hover{background:var(--surface);color:var(--ink)}
.nav-btn.on{background:var(--teal-dim);color:var(--teal)}
.nav-btn.on svg{opacity:1}
.nav-btn .cnt{margin-left:auto;font-size:11.5px;color:var(--ink3);font-variant-numeric:tabular-nums}
.side-foot{margin-top:auto;padding:10px 8px;font-size:11.5px;color:var(--ink3);line-height:1.5}

main{flex:1;min-width:0;padding:30px 34px 90px;max-width:1180px}
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);font-weight:600}
.page-head{margin-bottom:24px}
.page-head h1{font-size:26px;letter-spacing:-.02em;margin-top:2px}
.page-head p{color:var(--ink2);max-width:62ch;margin-top:4px}

.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 15px;border-radius:9px;
  background:var(--surface2);border:1px solid var(--line);font-size:14px;color:var(--ink)}
.btn:hover{border-color:var(--teal)}
.btn.primary{background:var(--teal);border-color:var(--teal);color:#062723;font-weight:600}
.btn.primary:hover{filter:brightness(1.08)}
.btn.small{padding:4px 10px;font-size:12.5px;border-radius:7px}
.btn.ghost{background:none}
.btn.danger{color:var(--danger);border-color:rgba(240,112,95,.4)}

.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:26px}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px}
.tile .lab{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);font-weight:600}
.tile .val{font-size:27px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.02em;margin-top:2px}
.tile .sub{font-size:12px;color:var(--ink2)}
.tile.hot{border-color:rgba(205,245,86,.35);background:linear-gradient(160deg,var(--lime-dim),var(--surface) 55%)}
.tile.hot .val{color:var(--lime)}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-bottom:14px}
.card h3{font-size:16px;margin-bottom:4px}
.muted{color:var(--ink2)}.mutex{color:var(--ink3)}
.sect{margin:26px 0 12px;display:flex;align-items:baseline;gap:10px}
.sect h2{font-size:17px;letter-spacing:-.01em}
.sect .mutex{font-size:13px}

.chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;
  padding:2.5px 9px;border-radius:99px;background:var(--surface2);color:var(--ink2);white-space:nowrap}
.chip .dot{width:7px;height:7px;border-radius:50%;flex:none}
.chip.status{background:var(--bg);border:1px solid var(--line)}
.chip.late{background:rgba(240,112,95,.15);color:var(--danger)}
.chip.today{background:var(--lime-dim);color:var(--lime)}
.chip.done{background:rgba(74,222,148,.13);color:var(--ok)}
.chip.err{background:rgba(240,112,95,.15);color:var(--danger)}

.row-item{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.row-item:last-child{border-bottom:none}
.row-item:hover .t{color:var(--teal)}
.row-item .t{font-weight:600;font-size:14.5px}
.row-item .meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:3px}
.row-item .when{margin-left:auto;flex:none;text-align:right;font-size:12.5px;color:var(--ink2);font-variant-numeric:tabular-nums}

.board{display:flex;gap:12px;overflow-x:auto;padding-bottom:14px;align-items:flex-start}
.col{flex:0 0 248px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:12px}
.col-h{display:flex;align-items:center;gap:8px;padding:0 4px 10px;font-size:12px;font-weight:700;
  letter-spacing:.09em;text-transform:uppercase;color:var(--ink2)}
.col-h .n{margin-left:auto;color:var(--ink3);font-variant-numeric:tabular-nums}
.kcard{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer}
.kcard:hover{border-color:var(--teal)}
.kcard .t{font-size:13.5px;font-weight:600;line-height:1.35}
.kcard .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
.kcard .foot{display:flex;align-items:center;margin-top:8px;gap:6px}
.kcard .date{font-size:11.5px;color:var(--ink3);font-variant-numeric:tabular-nums}
.mv{margin-left:auto;display:flex;gap:2px}
.mv button{padding:2px 7px;border-radius:6px;color:var(--ink3);font-size:13px;border:1px solid transparent}
.mv button:hover{color:var(--teal);border-color:var(--line);background:var(--surface2)}

.week{margin-bottom:22px}
.week-h{display:flex;align-items:baseline;gap:10px;margin-bottom:8px}
.week-h b{font-size:14px}
.week-h.now b{color:var(--lime)}
.slot{display:flex;gap:12px;align-items:center;padding:9px 12px;border:1px solid var(--line);
  border-radius:10px;margin-bottom:6px;background:var(--surface)}
.slot.empty{border-style:dashed;background:none;color:var(--ink3)}
.slot .day{flex:none;width:44px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink3);font-variant-numeric:tabular-nums;line-height:1.3}
.slot.todayrow{border-color:rgba(205,245,86,.45)}
.slot.todayrow .day{color:var(--lime)}
.slot .body{min-width:0;flex:1;cursor:pointer}
.slot .body:hover .t{color:var(--teal)}
.slot .t{font-size:13.5px;font-weight:600}
.slot .f{font-size:12px;color:var(--ink2)}

.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px}
.agent{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;display:flex;flex-direction:column;gap:8px}
.agent .ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:19px;background:var(--teal-dim)}
.agent h3{font-size:15px}
.agent p{font-size:13px;color:var(--ink2);flex:1}
.agent .out{font-size:11.5px;color:var(--ink3)}

.idea{display:flex;gap:12px;align-items:flex-start;padding:12px 4px;border-bottom:1px solid var(--line)}
.idea:last-child{border-bottom:none}
.idea .tx{flex:1;font-size:14px}
.idea .acts{display:flex;gap:6px;flex:none}

.backdrop{position:fixed;inset:0;background:rgba(4,10,20,.72);display:flex;
  align-items:flex-start;justify-content:center;padding:5vh 16px;z-index:50;overflow-y:auto}
.modal{background:var(--surface);border:1px solid var(--line);border-radius:16px;
  width:100%;max-width:680px;padding:24px;margin-bottom:5vh}
.modal h2{font-size:18px;margin-bottom:14px}
.frm{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.frm .full{grid-column:1/-1}
.frm label,.field-label{display:block;font-size:11.5px;font-weight:600;letter-spacing:.07em;
  text-transform:uppercase;color:var(--ink3);margin-bottom:4px}
.modal-foot{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap}
.modal-foot .right{margin-left:auto;display:flex;gap:8px}
.check{display:flex;align-items:center;gap:9px;padding:6px 2px;font-size:13.5px;color:var(--ink2);cursor:pointer}
.check input{width:15px;height:15px;accent-color:var(--teal);flex:none}
.check.on{color:var(--ink)}
.bar{height:5px;border-radius:99px;background:var(--bg);overflow:hidden;margin:6px 0 2px}
.bar i{display:block;height:100%;background:var(--teal);border-radius:99px}
.output-box{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:14px;
  font-size:13.5px;line-height:1.65;white-space:pre-wrap;max-height:52vh;overflow-y:auto;color:var(--ink)}
.run-row{display:flex;gap:10px;align-items:center;padding:9px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.run-row:last-child{border-bottom:none}
.run-row:hover .t{color:var(--teal)}
.run-row .t{font-size:13.5px;font-weight:600}
.run-row .sub{font-size:12px;color:var(--ink3)}
.run-row .when{margin-left:auto;font-size:12px;color:var(--ink3);flex:none;font-variant-numeric:tabular-nums}

.spinner{width:34px;height:34px;border-radius:50%;border:3px solid var(--line);
  border-top-color:var(--teal);animation:spin 0.9s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--teal);
  color:#062723;font-weight:600;font-size:14px;padding:10px 20px;border-radius:99px;z-index:99;
  box-shadow:0 6px 24px rgba(0,0,0,.4)}
.toast.error{background:var(--danger);color:#2A0E09}
.empty-note{padding:26px;text-align:center;color:var(--ink3);font-size:14px;
  border:1px dashed var(--line);border-radius:var(--r)}

.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.gate-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--line);
  border-radius:16px;padding:32px;text-align:center}
.gate-card .logo{justify-content:center;padding-bottom:14px}

@media (prefers-reduced-motion:no-preference){
  .kcard,.btn,.nav-btn,.row-item .t{transition:border-color .15s,background .15s,color .15s}
  .toast{animation:pop .2s ease-out}
  @keyframes pop{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
}
@media (prefers-reduced-motion:reduce){.spinner{animation-duration:2.5s}}
@media (max-width:840px){
  .app{flex-direction:column}
  .side{width:100%;height:auto;position:fixed;bottom:0;top:auto;z-index:40;
    flex-direction:row;align-items:center;padding:6px 8px;gap:2px;
    background:var(--surface);border-right:none;border-top:1px solid var(--line)}
  .logo,.side-foot{display:none}
  .nav-btn{flex-direction:column;gap:3px;font-size:10px;padding:6px 4px;flex:1;align-items:center}
  .nav-btn .cnt{display:none}
  main{padding:22px 16px 110px}
  .frm{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root"></div>
<div id="overlay"></div>

<script>
"use strict";
/* ============ CONFIG ============ */
const API_URL = "https://xhrycvwsnutuvziesbzb.supabase.co/functions/v1/api";
const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhocnljdndzbnV0dXZ6aWVzYnpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyODMyNzEsImV4cCI6MjA5ODg1OTI3MX0.TkH3Rq2yhDqLcR74M0YgoRTRHyoxHsQl7JOOiWnDhcU";
const KEY_STORE = "wip_hq_key";

/* ============ COSTANTI EDITORIALI ============ */
const RUBRICHE = {
  "Basi di Lavoro":{c:"#35E0CD"},
  "FAQ Professionali":{c:"#6FB6FF"},
  "WorkStat":{c:"#CDF556"},
  "HR Tech & Cyber":{c:"#B490F5"},
  "Sociologia & Organizzazione":{c:"#F2B84B"},
  "Talent & Performance":{c:"#F58FB8"},
  "News Flash":{c:"#F0705F"},
  "Mix":{c:"#9FB4CC"}
};
const FORMATI = ["Short 60″","Mini-lezione 5′","Video lungo 15-20′","Post LinkedIn","Newsletter","Infografica","News Flash","Report dati"];
const STATUSES = [
  {id:"idea",label:"Idea"},{id:"fonti",label:"Fonti"},{id:"scaletta",label:"Scaletta"},
  {id:"script",label:"Script"},{id:"produzione",label:"Produzione"},
  {id:"pubblicato",label:"Pubblicato"},{id:"riciclo",label:"Riciclo"}
];
const WORKFLOW = [
  "Rubrica e obiettivo scelti","Fonti raccolte e verificate","Titolo SEO + promessa + pubblico",
  "Scaletta: hook, 3 blocchi, esempi, CTA","Script o semi-script completo",
  "Produzione con asset brand (blu, turchese/lime, bussola)",
  "Riciclo: short, post LinkedIn, infografica/newsletter","Metriche annotate (view, watch-time, CTR)"
];
const CADENZA = {
  1:{f:"Short 60″",t:"Short teaser",d:"Anticipa il tema del video di venerdì"},
  3:{f:"Short 60″ + Post LinkedIn",t:"Short + LinkedIn",d:"FAQ rapida o dato forte, porta traffico"},
  5:{f:"Video lungo 15-20′",t:"Video principale",d:"Mini-lezione o approfondimento: il cuore del canale"},
  0:{f:"Newsletter",t:"Newsletter domenicale",d:"Riassume la settimana, anticipa la prossima"}
};
const GIORNI = ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
const MESI = ["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];
const ROLES = [
 {id:"capo",emoji:"🧭",name:"Caporedattore",who:"Tiene la rotta: piano editoriale, priorità e coerenza col brand.",out:"Piani editoriali · priorità settimanali · review di coerenza"},
 {id:"script",emoji:"✍️",name:"Sceneggiatore",who:"Trasforma il tema in scaletta e script con hook, 3 blocchi e CTA.",out:"Hook · scalette · script completi · note di regia"},
 {id:"seo",emoji:"🔍",name:"SEO & Titolista",who:"Titoli che si fanno cliccare, keyword e descrizioni YouTube complete.",out:"Titoli SEO · keyword · descrizione con timestamp · testi miniatura"},
 {id:"data",emoji:"📊",name:"Data Analyst WorkStat",who:"Trova e spiega i numeri: ISTAT, Eurostat, INPS, con idee di grafici.",out:"Dati con fonti · letture dei trend · specifiche grafici"},
 {id:"social",emoji:"📣",name:"Social Media Manager",who:"Ricicla ogni video in short e post LinkedIn che portano traffico.",out:"Post LinkedIn · script short 60″ · caroselli"},
 {id:"news",emoji:"💌",name:"Newsletter Editor",who:"Confeziona la newsletter domenicale: la settimana in chiaro.",out:"Newsletter completa · oggetti email · anticipazioni"},
 {id:"art",emoji:"🎨",name:"Art Director",who:"Miniature e asset visivi coerenti: blu scuro, turchese, bussola.",out:"Concept miniature · prompt grafici · brand check"},
 {id:"legal",emoji:"⚖️",name:"Fact-checker Normativo",who:"Verifica norme e istituti prima della pubblicazione. Zero figuracce.",out:"Tabella verifiche · riformulazioni · fonti ufficiali"}
];
const MODELS = [
  {id:"claude-opus-4-8",label:"Claude Opus 4.8 — massima qualità (consigliato)"},
  {id:"claude-sonnet-5",label:"Claude Sonnet 5 — ottima qualità, costo ridotto"},
  {id:"claude-haiku-4-5",label:"Claude Haiku 4.5 — veloce ed economico"}
];

/* ============ STATO E API ============ */
let KEY = localStorage.getItem(KEY_STORE) || "";
let S = { view:"oggi", loaded:false, contents:[], ideas:[], runs:[], settings:{model:"claude-opus-4-8",has_api_key:false}, teamSel:"", running:{}, archRole:"", archQ:"" };

async function api(action, payload){
  const res = await fetch(API_URL, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+ANON_KEY,
      "apikey":ANON_KEY,
      "x-app-key":KEY
    },
    body: JSON.stringify({action, payload: payload||{}})
  });
  let data = null;
  try{ data = await res.json(); }catch(e){ /* risposta non JSON */ }
  if(res.status === 401 && action !== "login"){ logout(); throw new Error("Sessione scaduta: accedi di nuovo."); }
  if(!res.ok) throw new Error((data && data.error) || ("Errore " + res.status));
  return data;
}
function logout(){ KEY=""; localStorage.removeItem(KEY_STORE); renderGate(); }

async function loadState(){
  const st = await api("state.get");
  S.contents = st.contents; S.ideas = st.ideas; S.runs = st.runs; S.settings = st.settings;
  S.loaded = true;
}

/* ============ HELPERS ============ */
const $=s=>document.querySelector(s);
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]))}
function todayISO(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function parseISO(s){const [y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)}
function fmtDate(s){if(!s)return "senza data";const d=parseISO(s);return GIORNI[d.getDay()]+" "+d.getDate()+" "+MESI[d.getMonth()]}
function fmtDateTime(s){const d=new Date(s);return d.getDate()+" "+MESI[d.getMonth()]+" · "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0")}
function daysTo(s){if(!s)return null;return Math.round((parseISO(s)-parseISO(todayISO()))/86400000)}
function statusIdx(id){return STATUSES.findIndex(x=>x.id===id)}
function isDone(c){return c.status==="pubblicato"||c.status==="riciclo"}
function isLate(c){const d=daysTo(c.data_pub);return d!==null&&d<0&&!isDone(c)}
function atRisk(c){
  const d=daysTo(c.data_pub);if(d===null||isDone(c))return false;
  const i=statusIdx(c.status);
  return (d<=1&&i<4)||(d<=3&&i<3)||(d<=5&&i<2);
}
function roleOf(id){return ROLES.find(r=>r.id===id)||{emoji:"🤖",name:id}}
function rubricaChip(r){const info=RUBRICHE[r]||RUBRICHE["Mix"];
  return `<span class="chip"><span class="dot" style="background:${info.c}"></span>${esc(r)}</span>`}
function statusChip(c){
  if(isDone(c))return `<span class="chip done">${esc(STATUSES[statusIdx(c.status)].label)}</span>`;
  if(isLate(c))return `<span class="chip late">In ritardo · ${esc(STATUSES[statusIdx(c.status)].label)}</span>`;
  if(atRisk(c))return `<span class="chip late">A rischio · ${esc(STATUSES[statusIdx(c.status)].label)}</span>`;
  return `<span class="chip status">${esc(STATUSES[statusIdx(c.status)].label)}</span>`}
function toast(msg, isErr){const t=document.createElement("div");t.className="toast"+(isErr?" error":"");
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),isErr?4200:2200)}
function fail(e){toast(e.message||"Errore imprevisto",true)}

/* ============ LOGIN GATE ============ */
function renderGate(msg){
  $("#root").innerHTML=`<div class="gate"><div class="gate-card">
    <div class="logo">${logoSVG()}<b>Work<i>In</i>Progress<small>HQ · Redazione</small></b></div>
    <p class="muted" style="font-size:13.5px;margin-bottom:16px">Il gestionale della tua redazione. Inserisci la password di accesso.</p>
    <form id="gate-form" style="display:grid;gap:10px">
      <input type="password" name="pw" placeholder="Password" autocomplete="current-password" required>
      <button class="btn primary" type="submit">Entra in redazione</button>
    </form>
    <p id="gate-err" style="color:var(--danger);font-size:13px;margin-top:10px">${esc(msg||"")}</p>
  </div></div>`;
  $("#gate-form").addEventListener("submit",async e=>{
    e.preventDefault();
    const pw=e.target.pw.value;
    const btn=e.target.querySelector("button");btn.disabled=true;btn.textContent="Verifico…";
    try{
      await api("login",{password:pw});
      KEY=pw;localStorage.setItem(KEY_STORE,pw);
      boot();
    }catch(err){
      btn.disabled=false;btn.textContent="Entra in redazione";
      $("#gate-err").textContent = err.message==="Password errata" ? "Password errata, riprova." : err.message;
    }
  });
}
function logoSVG(){return `<svg width="34" height="34" viewBox="0 0 34 34" aria-hidden="true">
  <circle cx="17" cy="17" r="15" fill="none" stroke="#35E0CD" stroke-width="2"/>
  <path d="M17 6 L20.5 17 L17 28 L13.5 17 Z" fill="#35E0CD"/>
  <path d="M17 6 L20.5 17 L17 17 Z" fill="#CDF556"/>
  <circle cx="17" cy="17" r="2.2" fill="#0B1626"/></svg>`}

    <div class="when">${esc(when)}<br><span class="mutex">${prog(c)}</span></div></div>`;
}

/* ============ VISTA: CALENDARIO ============ */
function mondayOf(d){const x=new Date(d);const wd=(x.getDay()+6)%7;x.setDate(x.getDate()-wd);return x}
function iso(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function renderCalendario(){
  const start=mondayOf(new Date());
  let out="";
  for(let w=0;w<8;w++){
    const mon=new Date(start);mon.setDate(mon.getDate()+w*7);
    const sun=new Date(mon);sun.setDate(sun.getDate()+6);
    const isNow=w===0;
    const slotDays=[1,3,5,0].map(dow=>{
      const dt=new Date(mon);dt.setDate(dt.getDate()+((dow===0)?6:dow-1));return {dow,dt};
    });
    const weekISO=new Set();for(let i=0;i<7;i++){const dd=new Date(mon);dd.setDate(dd.getDate()+i);weekISO.add(iso(dd))}
    const extra=S.contents.filter(c=>c.data_pub&&weekISO.has(c.data_pub)&&![1,3,5,0].includes(parseISO(c.data_pub).getDay()));
    out+=`<div class="week"><div class="week-h ${isNow?"now":""}">
      <b>${isNow?"Questa settimana":"Settimana"}</b>
      <span class="mutex">${mon.getDate()} ${MESI[mon.getMonth()]} – ${sun.getDate()} ${MESI[sun.getMonth()]}</span></div>
    ${slotDays.map(({dow,dt})=>{
      const dISO=iso(dt);
      const items=S.contents.filter(c=>c.data_pub===dISO);
      const slot=CADENZA[dow];
      const isToday=dISO===todayISO();
      if(items.length){
        return items.map(c=>`<div class="slot ${isToday?"todayrow":""}">
          <span class="day">${GIORNI[dow]}<br>${dt.getDate()}</span>
          <div class="body" data-open="${c.id}"><div class="t">${esc(c.title)}</div>
          <div class="f">${esc(c.formato)} · ${esc(c.rubrica)}</div></div>
          ${statusChip(c)}</div>`).join("");
      }
      return `<div class="slot empty ${isToday?"todayrow":""}">
        <span class="day">${GIORNI[dow]}<br>${dt.getDate()}</span>
        <div class="body"><div class="f">${esc(slot.t)} · ${esc(slot.f)}</div></div>
        <button class="btn small" data-new-date="${dISO}" data-new-formato="${esc(slot.f.split(" + ")[0])}">Pianifica</button></div>`;
    }).join("")}
    ${extra.map(c=>{const dt=parseISO(c.data_pub);return `<div class="slot">
      <span class="day">${GIORNI[dt.getDay()]}<br>${dt.getDate()}</span>
      <div class="body" data-open="${c.id}"><div class="t">${esc(c.title)}</div>
      <div class="f">${esc(c.formato)} · ${esc(c.rubrica)} · fuori cadenza</div></div>${statusChip(c)}</div>`}).join("")}
    </div>`;
  }
  $("#main").innerHTML=`
  <header class="page-head">
    <span class="eyebrow">Calendario editoriale</span>
    <h1>Le prossime 8 settimane</h1>
    <p>La cadenza WorkInProgress: lunedì short teaser, mercoledì short + LinkedIn, venerdì video principale, domenica newsletter.</p>
  </header>${out}`;
}

  const c=S.contents.find(x=>x.id===S.teamSel);
  if(!S.settings.has_api_key){

async function startWork(roleId,c,extra){
  const role=roleOf(roleId);
  S.running[roleId]=true;
  if(S.view==="team")render();
  toast(role.emoji+" "+role.name+" è al lavoro — puoi avviare altri agenti nel frattempo");
  try{
    const {run}=await api("agent.run",{role:roleId,content_id:c?c.id:null,extra});
    S.runs.unshift(run);
    toast(role.emoji+" "+role.name+" ha finito: trovi il lavoro nell'Archivio");
  }catch(err){
    toast(role.name+": "+(err.message||"errore"),true);
  }finally{
    delete S.running[roleId];
    if(S.view==="team"||S.view==="archivio")render();
  }
}
async function openRun(id){
  const r=S.runs.find(x=>x.id===id);if(!r)return;
  const role=roleOf(r.role);
  if(r.output===undefined||r.output===null){
    openModal(`<h2>${role.emoji} ${esc(role.name)}</h2>
      <div style="padding:22px 0"><div class="spinner"></div></div>
      <p class="mutex" style="text-align:center;font-size:13px">Recupero il lavoro dall'archivio…</p>`);
    try{
      const {run}=await api("run.get",{id});
      Object.assign(r,run);
    }catch(err){closeModal();fail(err);return}
  }
  openModal(`<h2>${role.emoji} ${esc(role.name)} · ${esc(r.content_title||"Progetto generale")}</h2>
    <p class="mutex" style="font-size:12px;margin-bottom:10px">${esc(fmtDateTime(r.created_at))} · ${esc(r.model||"")}${r.output_tokens?` · ${r.output_tokens} token generati`:""}</p>
    <div class="output-box">${esc(r.output||"(vuoto)")}</div>
    <div class="modal-foot">
      <button class="btn primary" id="copy-run">Copia testo</button>
      <div class="right"><button class="btn ghost" data-close>Chiudi</button></div>
    </div>`);
  $("#copy-run").addEventListener("click",async ()=>{
    try{await navigator.clipboard.writeText(r.output||"");toast("Copiato negli appunti")}
    catch(e){toast("Copia non riuscita: seleziona il testo a mano",true)}
  });
}

/* ============ VISTA: ARCHIVIO ============ */
function renderArchivio(){
  let runs=S.runs;
  if(S.archRole)runs=runs.filter(r=>r.role===S.archRole);
  if(S.archQ){
    const q=S.archQ.toLowerCase();
    runs=runs.filter(r=>(r.content_title||"Progetto generale").toLowerCase().includes(q));
  }
  const groups=new Map();
  for(const r of runs){
    const k=r.content_id||("t:"+(r.content_title||"Progetto generale"));
    if(!groups.has(k))groups.set(k,[]);
    groups.get(k).push(r);
  }
  let out="";
  for(const [k,rs] of groups){
    const c=S.contents.find(x=>x.id===rs[0].content_id);
    const title=rs[0].content_title||"Progetto generale";
    out+=`<div class="card">
      <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:6px">
        <h3 style="margin:0">${esc(title)}</h3>
        ${c?rubricaChip(c.rubrica):""}
        ${c?`<span class="chip">${esc(c.formato)}</span>`:""}
        <span class="mutex" style="font-size:12px;margin-left:auto">${rs.length} ${rs.length===1?"lavoro":"lavori"}</span>
      </div>
      ${rs.map(r=>runRow(r,true)).join("")}
    </div>`;
  }
  $("#main").innerHTML=`
  <header class="page-head">
    <span class="eyebrow">Archivio dei lavori</span>
    <h1>Tutto quello che il team ha prodotto</h1>
    <p>Ogni lavoro degli agenti è salvato qui per sempre, raggruppato per contenuto. Clicca per rileggere e copiare, ✕ per eliminare.</p>
  </header>
  <div class="card" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
    <select id="arch-role" style="flex:0 1 260px">
      <option value="">Tutti gli specialisti</option>
      ${ROLES.map(r=>`<option value="${r.id}" ${S.archRole===r.id?"selected":""}>${r.emoji} ${esc(r.name)}</option>`).join("")}
    </select>
    <input id="arch-q" placeholder="Cerca per contenuto…" value="${esc(S.archQ)}" style="flex:1;min-width:180px">
  </div>
  ${out||`<div class="empty-note">${S.runs.length?"Nessun lavoro corrisponde ai filtri.":"L'archivio è vuoto: vai nel Team AI e metti al lavoro il primo specialista."}</div>`}`;
  $("#arch-role").addEventListener("change",e=>{S.archRole=e.target.value;render()});
  $("#arch-q").addEventListener("input",e=>{
    S.archQ=e.target.value;
    clearTimeout(renderArchivio._t);
    renderArchivio._t=setTimeout(()=>{const pos=e.target.selectionStart;render();const el=$("#arch-q");if(el){el.focus();el.setSelectionRange(pos,pos)}},350);
  });
}

/* ============ VISTA: IDEE ============ */
function renderIdee(){
  $("#main").innerHTML=`
  <header class="page-head">
    <span class="eyebrow">Banca idee</span>
    <h1>Niente si perde</h1>
    <p>Appunta qui ogni spunto. Quando è maturo, promuovilo a contenuto: entrerà in pipeline come Idea.</p>
  </header>
  <div class="card"><form id="idea-form" style="display:grid;gap:8px;grid-template-columns:1fr 200px auto">
    <input name="text" placeholder="Nuovo spunto…" required>
    <select name="rubrica">${Object.keys(RUBRICHE).map(r=>`<option>${esc(r)}</option>`).join("")}</select>
    <button class="btn primary" type="submit">Aggiungi</button></form></div>
  <div class="card">${S.ideas.length?S.ideas.map(i=>`
    <div class="idea"><div class="tx">${esc(i.text)}<div style="margin-top:4px">${rubricaChip(i.rubrica)}</div></div>
    <div class="acts"><button class="btn small" data-promote="${i.id}">→ In pipeline</button>
    <button class="btn small ghost" data-del-idea="${i.id}" style="color:var(--ink3)">Elimina</button></div></div>`).join("")
    :`<div class="empty-note">La banca idee è vuota. Ogni spunto che ti passa per la testa merita una riga qui.</div>`}</div>`;
  $("#idea-form").addEventListener("submit",async e=>{
    e.preventDefault();const f=e.target;
    try{
      const {idea}=await api("idea.save",{text:f.text.value.trim(),rubrica:f.rubrica.value});
      S.ideas.unshift(idea);render();toast("Idea salvata");

}

/* ============ VISTA: IMPOSTAZIONI ============ */
function renderImpostazioni(){
  $("#main").innerHTML=`
  <header class="page-head">
    <span class="eyebrow">Impostazioni</span>
    <h1>Il motore della redazione</h1>
    <p>Gli agenti AI usano la tua chiave API Anthropic: paghi solo quello che consumi, direttamente sul tuo account.</p>
  </header>
  <div class="card">
    <h3>Chiave API Anthropic ${S.settings.has_api_key?'<span class="chip done">configurata</span>':'<span class="chip late">mancante</span>'}</h3>
    <p class="muted" style="font-size:13.5px;margin:6px 0 12px">Creala su <b>console.anthropic.com</b> → API Keys. Viene salvata in modo protetto sul server e non è mai visibile da qui${S.settings.has_api_key?": incolla una nuova chiave solo se vuoi sostituirla":""}.</p>
    <form id="key-form" style="display:flex;gap:8px;flex-wrap:wrap">
      <input type="password" name="key" placeholder="sk-ant-…" style="flex:1;min-width:220px" autocomplete="off">
      <button class="btn primary" type="submit">Salva chiave</button>
    </form>
  </div>
  <div class="card">
    <h3>Modello degli agenti</h3>
    <p class="muted" style="font-size:13.5px;margin:6px 0 12px">Quale cervello usa il team. Opus 4.8 dà i risultati migliori; Sonnet e Haiku costano meno a consumo.</p>
    <form id="model-form" style="display:flex;gap:8px;flex-wrap:wrap">
      <select name="model" style="flex:1;min-width:220px">
        ${MODELS.map(m=>`<option value="${m.id}" ${S.settings.model===m.id?"selected":""}>${esc(m.label)}</option>`).join("")}
      </select>
      <button class="btn primary" type="submit">Salva modello</button>
    </form>
  </div>
  <div class="card">
    <h3>Accesso</h3>
    <p class="muted" style="font-size:13.5px;margin:6px 0 12px">Questa app è protetta dalla tua password di redazione. Se la cambi (nel database), dovrai riaccedere.</p>
    <button class="btn danger" id="do-logout">Esci dalla redazione</button>
  </div>`;
  $("#key-form").addEventListener("submit",async e=>{
    e.preventDefault();
    const k=e.target.key.value.trim();
    if(!k){toast("Incolla una chiave prima di salvare",true);return}
    try{
      await api("settings.save",{anthropic_api_key:k});
      S.settings.has_api_key=true;e.target.key.value="";

/* ============ EDITOR CONTENUTO ============ */
function openModal(html){
  $("#overlay").innerHTML=`<div class="backdrop"><div class="modal" role="dialog" aria-modal="true">${html}</div></div>`;
  $(".backdrop").addEventListener("click",e=>{if(e.target.classList.contains("backdrop"))closeModal()});
  document.querySelectorAll("[data-close]").forEach(b=>b.addEventListener("click",closeModal));
}
function closeModal(){$("#overlay").innerHTML=""}

function newContent(preset){
  return {id:crypto.randomUUID(),title:"",rubrica:"Basi di Lavoro",
    formato:(preset&&preset.formato)||"Mini-lezione 5′",data_pub:(preset&&preset.date)||null,
    fonti:"",cta:"",note:"",status:"idea",checklist:WORKFLOW.map(()=>false)};
}
async function saveContent(c,isNew){
  const {content}=await api("content.save",{content:c});
  if(isNew)S.contents.push(content);
  else{const i=S.contents.findIndex(x=>x.id===c.id);if(i>=0)S.contents[i]=content}
  return content;
}
function openEditor(id,preset){
  const isNew=!id;
  const c=isNew?newContent(preset):{...S.contents.find(x=>x.id===id)};
  if(!c)return;
  c.checklist=Array.isArray(c.checklist)?c.checklist.slice():WORKFLOW.map(()=>false);
  const done=c.checklist.filter(Boolean).length;
  const myRuns=isNew?[]:S.runs.filter(r=>r.content_id===c.id);
  openModal(`<h2>${isNew?"Nuovo contenuto":"Modifica contenuto"}</h2>
  <form id="cform" class="frm">
    <div class="full"><label for="f-title">Titolo provvisorio</label><input id="f-title" name="title" value="${esc(c.title)}" placeholder="Es. Il periodo di prova spiegato bene" required></div>
    <div><label for="f-rubrica">Rubrica</label><select id="f-rubrica" name="rubrica">${Object.keys(RUBRICHE).map(r=>`<option ${r===c.rubrica?"selected":""}>${esc(r)}</option>`).join("")}</select></div>
    <div><label for="f-formato">Formato</label><select id="f-formato" name="formato">${FORMATI.map(f=>`<option ${f===c.formato?"selected":""}>${esc(f)}</option>`).join("")}</select></div>
    <div><label for="f-data">Data di pubblicazione</label><input id="f-data" type="date" name="data_pub" value="${esc(c.data_pub||"")}"></div>
    <div><label for="f-status">Stato</label><select id="f-status" name="status">${STATUSES.map(s=>`<option value="${s.id}" ${s.id===c.status?"selected":""}>${esc(s.label)}</option>`).join("")}</select></div>
    <div class="full"><label for="f-fonti">Fonti / appunti</label><input id="f-fonti" name="fonti" value="${esc(c.fonti)}" placeholder="Es. DL 62/2026, dati ISTAT, Appunti Alleva"></div>
    <div class="full"><label for="f-cta">Call-to-action</label><input id="f-cta" name="cta" value="${esc(c.cta)}" placeholder="Es. Guarda il video di venerdì"></div>
    <div class="full"><label for="f-note">Note</label><textarea id="f-note" name="note" rows="2" placeholder="Angolo, hook, cose da non dimenticare…">${esc(c.note)}</textarea></div>
  </form>
  ${isNew?"":`<div style="margin-top:16px"><span class="field-label">Flusso di lavoro · ${done}/${WORKFLOW.length}</span>
    <div class="bar"><i style="width:${Math.round(done/WORKFLOW.length*100)}%"></i></div>
    ${WORKFLOW.map((w,i)=>`<label class="check ${c.checklist[i]?"on":""}"><input type="checkbox" data-chk="${i}" ${c.checklist[i]?"checked":""}>${esc(w)}</label>`).join("")}</div>`}
  ${myRuns.length?`<div style="margin-top:16px"><span class="field-label">Lavori del Team AI · ${myRuns.length}</span>
    ${myRuns.map(runRow).join("")}</div>`:""}
  <div class="modal-foot">
    ${isNew?"":`<button class="btn danger" id="del-content" type="button">Elimina</button>`}
    <div class="right">
      <button class="btn ghost" data-close type="button">Annulla</button>
      <button class="btn primary" id="save-content" type="button">${isNew?"Crea contenuto":"Salva"}</button>
    </div>
  </div>`);
  if(!isNew){
    document.querySelectorAll("[data-chk]").forEach(el=>el.addEventListener("change",async e=>{
      c.checklist[Number(e.target.dataset.chk)]=e.target.checked;
      e.target.closest(".check").classList.toggle("on",e.target.checked);
      try{await saveContent(c,false)}catch(err){fail(err)}
    }));
    $("#del-content").addEventListener("click",async ()=>{
      if(!confirm("Eliminare definitivamente questo contenuto?"))return;
      try{
        await api("content.delete",{id:c.id});
        S.contents=S.contents.filter(x=>x.id!==c.id);
        closeModal();render();toast("Contenuto eliminato");
      }catch(err){fail(err)}
    });
  }
  $("#save-content").addEventListener("click",async ()=>{
    const f=$("#cform");
    if(!f.title.value.trim()){f.title.focus();return}
    c.title=f.title.value.trim();c.rubrica=f.rubrica.value;c.formato=f.formato.value;
    c.data_pub=f.data_pub.value||null;c.status=f.status.value;c.fonti=f.fonti.value.trim();
    c.cta=f.cta.value.trim();c.note=f.note.value.trim();
    try{
      await saveContent(c,isNew);
      closeModal();render();toast(isNew?"Contenuto in pipeline":"Salvato");
    }catch(err){fail(err)}
  });
}

/* ============ EVENTI GLOBALI ============ */
document.addEventListener("click",async e=>{
  const nav=e.target.closest("[data-view]");
  if(nav){e.preventDefault();S.view=nav.dataset.view;render();return}
  const open=e.target.closest("[data-open]");
  if(open){openEditor(open.dataset.open);return}
  const nu=e.target.closest("[data-new-date]");
  if(nu){openEditor(null,{date:nu.dataset.newDate||null,formato:nu.dataset.newFormato});return}
  const mv=e.target.closest("[data-move]");
  if(mv){
    const [id,dir]=mv.dataset.move.split("|");
    const c=S.contents.find(x=>x.id===id);
    const i=statusIdx(c.status)+Number(dir);
    if(i>=0&&i<STATUSES.length){
      const prev=c.status;c.status=STATUSES[i].id;render();
      try{await saveContent(c,false)}catch(err){c.status=prev;render();fail(err)}
    }
    return;
  }
  const wk=e.target.closest("[data-work]");
  if(wk){openWork(wk.dataset.work);return}
  const rn=e.target.closest("[data-run]");
  if(rn&&!e.target.closest("[data-del-run]")){openRun(rn.dataset.run);return}
  const pr=e.target.closest("[data-promote]");
  if(pr){
    try{
      const {content}=await api("idea.promote",{id:pr.dataset.promote});
      S.ideas=S.ideas.filter(x=>x.id!==pr.dataset.promote);
      S.contents.push(content);
      render();toast("Promossa: la trovi in Pipeline → Idea");
    }catch(err){fail(err)}
    return;
  }
  const di=e.target.closest("[data-del-idea]");
  if(di){
    try{
      await api("idea.delete",{id:di.dataset.delIdea});
      S.ideas=S.ideas.filter(x=>x.id!==di.dataset.delIdea);
      render();
    }catch(err){fail(err)}
    return;
  }
  const dr=e.target.closest("[data-del-run]");
  if(dr){
    e.stopPropagation();
    if(!confirm("Eliminare definitivamente questo lavoro dall'archivio?"))return;
    try{
      await api("run.delete",{id:dr.dataset.delRun});
      S.runs=S.runs.filter(x=>x.id!==dr.dataset.delRun);
      render();toast("Lavoro eliminato");
    }catch(err){fail(err)}
    return;
  }
});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()});

/* ============ BOOT & RENDER ============ */
function render(){
  renderNav();
  ({oggi:renderOggi,pipeline:renderPipeline,calendario:renderCalendario,
    team:renderTeam,archivio:renderArchivio,idee:renderIdee,impostazioni:renderImpostazioni}[S.view]||renderOggi)();
  window.scrollTo(0,0);
}
async function boot(){
  renderShell();
  $("#main").innerHTML=`<div style="padding:60px 0"><div class="spinner"></div>
    <p class="mutex" style="text-align:center;margin-top:14px;font-size:13.5px">Carico la redazione…</p></div>`;
  try{
    await loadState();
    render();
  }catch(e){
    if(KEY)renderGate(e.message);
  }
}
if(KEY)boot();else renderGate();
</script>
</body>
</html>
